version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./reports:/app/reports
  
  dashboard:
    build: .
    command: python3 dashboard.py
    ports:
      - "5001:5001"
    depends_on:
      - api
  
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
